name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint + Typecheck + Test
        run: |
          npm run lint
          npm run typecheck
          npm run test
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: staging
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENABLE_SENTRY: 'true'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_FEATURE_OFFLINE: 'true'
          VITE_FEATURE_GUESTLIST: 'true'
          VITE_FEATURE_PURCHASING: 'true'
          VITE_FEATURE_RECIPES: 'true'

      - name: Apply Supabase migrations (staging)
        run: npx supabase db push --project-ref ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: staging
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENABLE_SENTRY: 'true'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_FEATURE_OFFLINE: 'true'
          VITE_FEATURE_GUESTLIST: 'true'
          VITE_FEATURE_PURCHASING: 'true'
          VITE_FEATURE_RECIPES: 'true'

      - name: Deploy to Vercel (staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          alias-domains: staging.barinv.app
